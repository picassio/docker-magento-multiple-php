<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mage UI — Docker Magento</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="vendor/xterm.css">
<!-- All deps bundled locally — works fully offline -->
<script src="vendor/preact.umd.js"></script>
<script src="vendor/preact-hooks.umd.js"></script>
<script src="vendor/htm.umd.js"></script>
<script src="vendor/ace.js"></script>
<script src="vendor/xterm.js"></script>
<script src="vendor/xterm-fit.js"></script>
<script>
// Wire up globals for app.js
window._preact = {
  h: preact.h, render: preact.render,
  html: htm.bind(preact.h),
  ...preactHooks
};
// Tell Ace where to find modes/themes/workers (local vendor)
if (window.ace) ace.config.set('basePath', 'vendor');
</script>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toasts"></div>
<script src="app.js"></script>
</body>
</html>
