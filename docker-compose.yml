# =============================================================================
# Docker Magento – Multi-PHP Development Stack
# =============================================================================
# Usage:
#   docker compose up -d                     # Core services + PHP 8.x
#   docker compose --profile legacy up -d    # Include PHP 7.x
#   docker compose --profile debug up -d     # phpMyAdmin + Redis Commander
#   docker compose --profile mariadb up -d   # MariaDB instead of MySQL
#   docker compose --profile varnish up -d   # Varnish reverse proxy
#   docker compose --profile dashboards up -d # OpenSearch Dashboards
#   docker compose --profile elasticsearch up -d # Elasticsearch (alt search)
# =============================================================================

services:

  # ── Web Server ──────────────────────────────────────────────────────────────

  nginx:
    image: nginx:stable-alpine
    hostname: nginx
    volumes:
      - ./conf/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./conf/nginx/ssl:/etc/nginx/ssl:ro
      - ./conf/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./sources:/home/public_html
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    restart: unless-stopped

  # ── PHP Services ────────────────────────────────────────────────────────────
  # Legacy PHP 7.x (profiles: [legacy]) — opt-in only
  # Modern PHP 8.1+ — always available

  # Legacy PHP 7.0–7.3: built from source (no longer in ondrej/php PPA)
  # Uses build/php-legacy/Dockerfile which compiles PHP from php.net tarballs

  php70:
    build:
      context: ./build/php-legacy
      args:
        BASE_IMAGE: ubuntu:bionic
        PHP_VERSION: "7.0"
        PHP_PATCH_VERSION: "7.0.33"
        COMPOSER_VERSION: "1.10.19"
        NODE_MAJOR: "18"
        XDEBUG_VERSION: "2.7.2"
    hostname: php70
    profiles: [legacy]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php70/magento.conf:/etc/php/7.0/fpm/pool.d/www.conf:ro
      - ./conf/php/php70/php.ini:/etc/php/7.0/fpm/php.ini:ro
      - ./conf/php/php70/php.ini:/etc/php/7.0/cli/php.ini:ro
    restart: unless-stopped

  php71:
    build:
      context: ./build/php-legacy
      args:
        BASE_IMAGE: ubuntu:bionic
        PHP_VERSION: "7.1"
        PHP_PATCH_VERSION: "7.1.33"
        COMPOSER_VERSION: "1.10.19"
        NODE_MAJOR: "18"
        XDEBUG_VERSION: "2.9.8"
    hostname: php71
    profiles: [legacy]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php71/magento.conf:/etc/php/7.1/fpm/pool.d/www.conf:ro
      - ./conf/php/php71/php.ini:/etc/php/7.1/fpm/php.ini:ro
      - ./conf/php/php71/php.ini:/etc/php/7.1/cli/php.ini:ro
    restart: unless-stopped

  php72:
    build:
      context: ./build/php-legacy
      args:
        BASE_IMAGE: ubuntu:focal
        PHP_VERSION: "7.2"
        PHP_PATCH_VERSION: "7.2.34"
        COMPOSER_VERSION: "1.10.19"
        NODE_MAJOR: "18"
        XDEBUG_VERSION: "2.9.8"
    hostname: php72
    profiles: [legacy]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php72/magento.conf:/etc/php/7.2/fpm/pool.d/www.conf:ro
      - ./conf/php/php72/php.ini:/etc/php/7.2/fpm/php.ini:ro
      - ./conf/php/php72/php.ini:/etc/php/7.2/cli/php.ini:ro
    restart: unless-stopped

  php73:
    build:
      context: ./build/php-legacy
      args:
        BASE_IMAGE: ubuntu:focal
        PHP_VERSION: "7.3"
        PHP_PATCH_VERSION: "7.3.33"
        COMPOSER_VERSION: "1.10.19"
        NODE_MAJOR: "18"
        XDEBUG_VERSION: "2.9.8"
    hostname: php73
    profiles: [legacy]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php73/magento.conf:/etc/php/7.3/fpm/pool.d/www.conf:ro
      - ./conf/php/php73/php.ini:/etc/php/7.3/fpm/php.ini:ro
      - ./conf/php/php73/php.ini:/etc/php/7.3/cli/php.ini:ro
    restart: unless-stopped

  php74:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:focal
        PHP_VERSION: "7.4"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "2.9.8"
    hostname: php74
    profiles: [legacy]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php74/magento.conf:/etc/php/7.4/fpm/pool.d/www.conf:ro
      - ./conf/php/php74/php.ini:/etc/php/7.4/fpm/php.ini:ro
      - ./conf/php/php74/php.ini:/etc/php/7.4/cli/php.ini:ro
    restart: unless-stopped

  php81:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.1"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.4.7"
    hostname: php81
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php81/magento.conf:/etc/php/8.1/fpm/pool.d/www.conf:ro
      - ./conf/php/php81/php.ini:/etc/php/8.1/fpm/php.ini:ro
      - ./conf/php/php81/php.ini:/etc/php/8.1/cli/php.ini:ro
    restart: unless-stopped

  php82:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.2"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.4.7"
    hostname: php82
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php82/magento.conf:/etc/php/8.2/fpm/pool.d/www.conf:ro
      - ./conf/php/php82/php.ini:/etc/php/8.2/fpm/php.ini:ro
      - ./conf/php/php82/php.ini:/etc/php/8.2/cli/php.ini:ro
    restart: unless-stopped

  php83:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.3"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.4.7"
    hostname: php83
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php83/magento.conf:/etc/php/8.3/fpm/pool.d/www.conf:ro
      - ./conf/php/php83/php.ini:/etc/php/8.3/fpm/php.ini:ro
      - ./conf/php/php83/php.ini:/etc/php/8.3/cli/php.ini:ro
    restart: unless-stopped

  php84:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.4"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.5.1"
    hostname: php84
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php84/magento.conf:/etc/php/8.4/fpm/pool.d/www.conf:ro
      - ./conf/php/php84/php.ini:/etc/php/8.4/fpm/php.ini:ro
      - ./conf/php/php84/php.ini:/etc/php/8.4/cli/php.ini:ro
    restart: unless-stopped

  # ── Database ────────────────────────────────────────────────────────────────

  mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    hostname: mysql
    command: --mysql-native-password=ON --authentication-policy=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-magento}
      MYSQL_USER: ${MYSQL_USER:-magento}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-magento}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./conf/mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql80:
    image: mysql:${MYSQL80_VERSION:-8.0}
    hostname: mysql80
    profiles: [mysql80]
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-magento}
      MYSQL_USER: ${MYSQL_USER:-magento}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-magento}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - ./data/mysql80:/var/lib/mysql
      - ./conf/mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "${MYSQL80_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mariadb:
    image: mariadb:${MARIADB_VERSION:-11.4}
    hostname: mariadb
    profiles: [mariadb]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-magento}
      MYSQL_USER: ${MYSQL_USER:-magento}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-magento}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ./conf/mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "${MARIADB_PORT:-3308}:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Mail ────────────────────────────────────────────────────────────────────

  mailpit:
    image: axllent/mailpit:latest
    hostname: mailpit
    ports:
      - "1025:1025"
      - "${MAILPIT_PORT:-8025}:8025"
    restart: unless-stopped

  # ── Cache ───────────────────────────────────────────────────────────────────

  redis:
    image: redis:${REDIS_VERSION:-7.4}-alpine
    hostname: redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis6:
    image: redis:${REDIS6_VERSION:-6.2}-alpine
    hostname: redis6
    profiles: [redis6]
    ports:
      - "127.0.0.1:${REDIS6_PORT:-6380}:6379"
    volumes:
      - redis6_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Search Engine ───────────────────────────────────────────────────────────

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.1}
    hostname: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  opensearch1:
    image: opensearchproject/opensearch:${OPENSEARCH1_VERSION:-1.3.19}
    hostname: opensearch1
    profiles: [opensearch1]
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch1-data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH1_PORT:-9201}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION:-2.19.1}
    hostname: opensearch-dashboards
    profiles: [dashboards]
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_VERSION:-8.17.0}
    hostname: elasticsearch
    profiles: [elasticsearch]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9202}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  elasticsearch7:
    image: elasticsearch:${ELASTICSEARCH7_VERSION:-7.17.27}
    hostname: elasticsearch7
    profiles: [elasticsearch7]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch7-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH7_PORT:-9203}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Message Queue ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-4.1}-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq/
    ports:
      - "5672:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Debug Tools ─────────────────────────────────────────────────────────────

  phpmyadmin:
    image: phpmyadmin:latest
    profiles: [debug]
    environment:
      PMA_HOST: mysql
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: [debug]
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "${REDISCMD_PORT:-8081}:8081"
    restart: unless-stopped

  # ── Varnish ─────────────────────────────────────────────────────────────────

  varnish:
    image: varnish:${VARNISH_VERSION:-7.6}-alpine
    hostname: varnish
    profiles: [varnish]
    ports:
      - "6081:80"
    depends_on:
      - nginx
    volumes:
      - ./conf/varnish/default.vcl:/etc/varnish/default.vcl:ro
    command: -f /etc/varnish/default.vcl -a 0.0.0.0:80 -s malloc,256m
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────────────────────────

volumes:
  composer_cache:
  opensearch-data:
  opensearch1-data:
  elasticsearch-data:
  elasticsearch7-data:
  redis_data:
  redis6_data:
  rabbitmq-data:
