# =============================================================================
# Docker Magento – Multi-PHP Development Stack
# =============================================================================
# Core services only. Non-default services live in compose/*.yml override files.
#
# Usage:
#   bin/mage up                          # Smart start from projects.json
#   docker compose up -d                 # Core: nginx + PHP 8.x + MySQL 8.4 + OpenSearch + Redis
#   docker compose -f docker-compose.yml -f compose/legacy.yml up -d   # + PHP 7.x
#   docker compose -f docker-compose.yml -f compose/mariadb.yml up -d  # + MariaDB
#
# Override files in compose/:
#   legacy.yml          PHP 7.0–7.4 (source-built)
#   mysql80.yml         MySQL 8.0 on port 3307
#   mariadb.yml         MariaDB 11.4 on port 3308
#   opensearch1.yml     OpenSearch 1.3 on port 9201
#   elasticsearch.yml   Elasticsearch 8.x on port 9202
#   elasticsearch7.yml  Elasticsearch 7.x on port 9203
#   redis6.yml          Redis 6.2 on port 6380
#   debug.yml           phpMyAdmin + Redis Commander
#   varnish.yml         Varnish 7.6
#   dashboards.yml      OpenSearch Dashboards
# =============================================================================

services:

  # ── Web Server ──────────────────────────────────────────────────────────────

  nginx:
    image: nginx:stable-alpine
    hostname: nginx
    volumes:
      - ./conf/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./conf/nginx/ssl:/etc/nginx/ssl:ro
      - ./conf/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./sources:/home/public_html
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    restart: unless-stopped

  # ── PHP (Modern — 8.1 through 8.4) ─────────────────────────────────────────

  php81:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.1"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.4.7"
    hostname: php81
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php81/magento.conf:/etc/php/8.1/fpm/pool.d/www.conf:ro
      - ./conf/php/php81/php.ini:/etc/php/8.1/fpm/php.ini:ro
      - ./conf/php/php81/php.ini:/etc/php/8.1/cli/php.ini:ro
    restart: unless-stopped

  php82:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.2"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.4.7"
    hostname: php82
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php82/magento.conf:/etc/php/8.2/fpm/pool.d/www.conf:ro
      - ./conf/php/php82/php.ini:/etc/php/8.2/fpm/php.ini:ro
      - ./conf/php/php82/php.ini:/etc/php/8.2/cli/php.ini:ro
    restart: unless-stopped

  php83:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.3"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.4.7"
    hostname: php83
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php83/magento.conf:/etc/php/8.3/fpm/pool.d/www.conf:ro
      - ./conf/php/php83/php.ini:/etc/php/8.3/fpm/php.ini:ro
      - ./conf/php/php83/php.ini:/etc/php/8.3/cli/php.ini:ro
    restart: unless-stopped

  php84:
    build:
      context: ./build/php
      args:
        BASE_IMAGE: ubuntu:24.04
        PHP_VERSION: "8.4"
        COMPOSER_VERSION: "2.8.4"
        NODE_MAJOR: "20"
        XDEBUG_VERSION: "3.5.1"
    hostname: php84
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./sources:/home/public_html
      - composer_cache:/home/nginx/.composer
      - ./conf/php/php84/magento.conf:/etc/php/8.4/fpm/pool.d/www.conf:ro
      - ./conf/php/php84/php.ini:/etc/php/8.4/fpm/php.ini:ro
      - ./conf/php/php84/php.ini:/etc/php/8.4/cli/php.ini:ro
    restart: unless-stopped

  # ── Database (default: MySQL 8.4) ───────────────────────────────────────────

  mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    hostname: mysql
    command: --mysql-native-password=ON --authentication-policy=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-magento}
      MYSQL_USER: ${MYSQL_USER:-magento}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-magento}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./conf/mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Mail ────────────────────────────────────────────────────────────────────

  mailpit:
    image: axllent/mailpit:latest
    hostname: mailpit
    ports:
      - "1025:1025"
      - "${MAILPIT_PORT:-8025}:8025"
    restart: unless-stopped

  # ── Cache (default: Redis 7.x) ─────────────────────────────────────────────

  redis:
    image: redis:${REDIS_VERSION:-7.4}-alpine
    hostname: redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Search (default: OpenSearch 2.x) ────────────────────────────────────────

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.1}
    hostname: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Message Queue ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-4.1}-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq/
    ports:
      - "5672:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────────────────────────

volumes:
  composer_cache:
  opensearch-data:
  redis_data:
  rabbitmq-data:
