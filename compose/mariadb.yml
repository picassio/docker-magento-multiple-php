# MariaDB 11.4 — for Magento 2.4.8+
services:
  mariadb:
    image: mariadb:${MARIADB_VERSION:-11.4}
    hostname: mariadb
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-magento}
      MYSQL_USER: ${MYSQL_USER:-magento}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-magento}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ./conf/mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "${MARIADB_PORT:-3308}:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
