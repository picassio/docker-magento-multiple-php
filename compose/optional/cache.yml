# Cache Stack - Redis & Varnish
services:
  redis:
    image: "redis:6.0-alpine"
    ports:
      - "127.0.0.1:6379:6379"
    sysctls:
      - "net.core.somaxconn=65535"
    volumes:
      - "redis_data:/data"

  varnish:
    build:
      context: ../../build/varnish
    image: varnish-6.0:v1
    hostname: varnish
    ports:
      - 6081:6081
    depends_on:
      - nginx
    volumes:
      - ../../conf/varnish/default.vcl:/etc/varnish/default.vcl

volumes:
  redis_data:
    external: true
