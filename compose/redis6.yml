# Redis 6.x — for Magento 2.4.0–2.4.5
services:
  redis6:
    image: redis:${REDIS6_VERSION:-6.2}-alpine
    hostname: redis6
    ports:
      - "127.0.0.1:${REDIS6_PORT:-6380}:6379"
    volumes:
      - redis6_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis6_data:
