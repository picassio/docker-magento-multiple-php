# Varnish 7.x — full-page cache
services:
  varnish:
    image: varnish:${VARNISH_VERSION:-7.6}-alpine
    hostname: varnish
    ports:
      - "6081:80"
    depends_on:
      - nginx
    volumes:
      - ./conf/varnish/default.vcl:/etc/varnish/default.vcl:ro
    command: -f /etc/varnish/default.vcl -a 0.0.0.0:80 -s malloc,256m
    restart: unless-stopped
