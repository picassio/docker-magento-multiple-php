# OpenSearch 1.x — for Magento 2.4.4–2.4.5
services:
  opensearch1:
    image: opensearchproject/opensearch:${OPENSEARCH1_VERSION:-1.3.19}
    hostname: opensearch1
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch1-data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH1_PORT:-9201}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  opensearch1-data:
